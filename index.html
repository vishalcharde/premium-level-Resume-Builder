<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Fidelity ATS Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Executive Template -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- html2pdf.js library download pipeline script inclusion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="dashboard-container">
        <!-- LEFT SIDEBAR PANEL: Form Configuration Controls -->
        <aside class="sidebar-panel">
            <header class="app-header">
                <div class="logo-area">
                    <div class="logo-icon-wrapper">
                        <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div>
                        <h1>Resume<span class="gradient-text">Engine</span></h1>
                        <div class="tagline">ATS Optimization Studio</div>
                    </div>
                </div>
                <div class="global-actions">
                    <button class="action-btn circle-btn" id="themeToggleBtn" title="Toggle Theme">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <button class="action-btn text-btn danger-btn" id="clearDataBtn">Reset System</button>
                    <button class="action-btn gradient-btn" id="downloadPdfBtn" style="margin-left: auto;">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Export PDF
                    </button>
                </div>
            </header>

            <div class="template-selector">
                <div class="section-micro-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"></path></svg>
                    Layout Engine Presets
                </div>
                <div class="template-grid">
                    <button class="template-option active" data-template="modern">
                        <div class="preview-swatch modern-swatch"></div>
                        Modern Minimal
                    </button>
                    <button class="template-option" data-template="executive">
                        <div class="preview-swatch executive-swatch"></div>
                        Executive Serif
                    </button>
                    <button class="template-option" data-template="tech">
                        <div class="preview-swatch tech-swatch"></div>
                        Tech Split
                    </button>
                </div>
            </div>

            <!-- Dynamic Input Form Injection Point -->
            <form id="resumeDataForm" class="form-scroll-viewport" onsubmit="event.preventDefault();">
                <!-- JavaScript handles form sections structure insertion inside this container -->
            </form>
        </aside>

        <!-- RIGHT PREVIEW PANEL: Live Scaled Canvas Sheet -->
        <main class="preview-panel">
            <div class="preview-sticky-wrapper">
                <div class="preview-header-meta">
                    <div class="status-indicator">
                        <div class="pulse-dot"></div>
                        Realtime Sync Active
                    </div>
                    <div class="page-count-badge" id="pageCounter">A4 Canvas Target Layer</div>
                </div>
                
                <div class="resume-paper-shadow-wrapper">
                    <!-- The dynamic element that turns straight into print matrix layout -->
                    <div id="resumeCanvas" class="resume-canvas template-modern">
                        <!-- Live text layout structure streams right here from render loop matrix -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- System Communication Toast Node Container -->
    <div id="toastNotification" class="toast-card"></div>

    <script src="app.js"></script>
</body>
</html>
